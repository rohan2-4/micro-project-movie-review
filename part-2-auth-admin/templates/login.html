<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e8f4fc; color: #2c3e50; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background-color: #5dade2 !important; }
        .navbar-brand { color: #fff !important; font-weight: bold; font-size: 1.5rem; }
        .nav-link { color: #fff !important; }
        .login-card { background-color: #fff; border: 1px solid #aed6f1; max-width: 400px; margin: 50px auto; }
        .form-control { background-color: #fff; border: 1px solid #aed6f1; color: #2c3e50; }
        .form-control:focus { background-color: #fff; color: #2c3e50; border-color: #3498db; box-shadow: 0 0 5px rgba(52,152,219,0.5); }
        .btn-primary { background-color: #3498db; border-color: #3498db; width: 100%; }
        .btn-primary:hover { background-color: #2980b9; border-color: #2980b9; }
        .alert { margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">MovieHub</a>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex align-items-center">
        <div class="card login-card p-4 w-100">
            <h3 class="text-center mb-4">Login</h3>
            <div id="errorAlert" class="alert alert-danger d-none"></div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required placeholder="Enter your email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <p class="text-center mt-3 mb-0">
                Don't have an account? <a href="/register" style="color: #3498db;">Register</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = data.user.is_admin ? '/admin' : '/';
                } else {
                    document.getElementById('errorAlert').textContent = data.error;
                    document.getElementById('errorAlert').classList.remove('d-none');
                }
            } catch (err) {
                document.getElementById('errorAlert').textContent = 'An error occurred';
                document.getElementById('errorAlert').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
