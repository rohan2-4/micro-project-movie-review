<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e8f4fc; color: #2c3e50; min-height: 100vh; display: flex; flex-direction: column; }
        .navbar { background-color: #5dade2 !important; }
        .navbar-brand { color: #fff !important; font-weight: bold; font-size: 1.5rem; }
        .register-card { background-color: #fff; border: 1px solid #aed6f1; max-width: 400px; margin: 50px auto; }
        .form-control { background-color: #fff; border: 1px solid #aed6f1; color: #2c3e50; }
        .form-control:focus { background-color: #fff; color: #2c3e50; border-color: #3498db; box-shadow: 0 0 5px rgba(52,152,219,0.5); }
        .btn-primary { background-color: #3498db; border-color: #3498db; width: 100%; }
        .btn-primary:hover { background-color: #2980b9; border-color: #2980b9; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">MovieHub</a>
        </div>
    </nav>

    <div class="container flex-grow-1 d-flex align-items-center">
        <div class="card register-card p-4 w-100">
            <h3 class="text-center mb-4">Register</h3>
            <div id="errorAlert" class="alert alert-danger d-none"></div>
            <div id="successAlert" class="alert alert-success d-none"></div>
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required placeholder="Choose a username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required placeholder="Enter your email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
            <p class="text-center mt-3 mb-0">
                Already have an account? <a href="/login" style="color: #3498db;">Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();

                if (res.ok) {
                    document.getElementById('successAlert').textContent = 'Registration successful! Redirecting to login...';
                    document.getElementById('successAlert').classList.remove('d-none');
                    document.getElementById('errorAlert').classList.add('d-none');
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    document.getElementById('errorAlert').textContent = data.error;
                    document.getElementById('errorAlert').classList.remove('d-none');
                }
            } catch (err) {
                document.getElementById('errorAlert').textContent = 'An error occurred';
                document.getElementById('errorAlert').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
