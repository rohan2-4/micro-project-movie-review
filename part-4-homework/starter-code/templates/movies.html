<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub - All Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e8f4fc; color: #2c3e50; min-height: 100vh; }
        .navbar { background-color: #5dade2 !important; }
        .navbar-brand { color: #fff !important; font-weight: bold; font-size: 1.5rem; }
        .nav-link { color: #fff !important; }
        .nav-link:hover, .nav-link.active { color: #1a5276 !important; }
        .movie-card { background-color: #fff; border: 1px solid #aed6f1; transition: transform 0.3s; cursor: pointer; }
        .movie-card:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(93,173,226,0.3); }
        .movie-poster { height: 300px; object-fit: cover; }
        .category-badge { background-color: #3498db; }
        .rating-stars { color: #f39c12; }
        .search-box { background-color: #fff; border: 1px solid #aed6f1; color: #2c3e50; }
        .search-box:focus { background-color: #fff; color: #2c3e50; border-color: #3498db; box-shadow: 0 0 5px rgba(52,152,219,0.5); }
        .btn-primary { background-color: #3498db; border-color: #3498db; }
        .btn-primary:hover { background-color: #2980b9; border-color: #2980b9; }
        .btn-outline-light:hover { background-color: #3498db; border-color: #3498db; }
        .category-btn { margin: 5px; }
        .category-btn.active { background-color: #3498db; border-color: #3498db; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">MovieHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/movies">All Movies</a></li>
                </ul>
                <ul class="navbar-nav" id="authNav"></ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h1 class="mb-4">All Movies</h1>

        <div class="row mb-4">
            <div class="col-md-6 mb-3">
                <input type="text" class="form-control search-box" id="searchInput" placeholder="Search by title...">
            </div>
            <div class="col-md-6" id="categoryButtons">
                <button class="btn btn-outline-light category-btn active" data-category="">All</button>
            </div>
        </div>

        <p class="text-muted mb-4" id="movieCount">Loading...</p>

        <div class="row" id="moviesContainer">
            <div class="col-12 text-center"><p>Loading movies...</p></div>
        </div>
    </div>

    <footer class="py-4 mt-auto" style="background-color: #5dade2;">
        <div class="container text-center">
            <p class="mb-0 text-white">MovieHub - Part 4: Homework</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        let selectedCategory = '';

        function updateNav() {
            const authNav = document.getElementById('authNav');
            if (token && user) {
                authNav.innerHTML = `
                    <li class="nav-item"><a class="nav-link" href="/submit-movie">Submit Movie</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard">My Reviews</a></li>
                    ${user.is_admin ? '<li class="nav-item"><a class="nav-link" href="/admin">Admin</a></li>' : ''}
                    <li class="nav-item"><span class="nav-link">Hi, ${user.username}</span></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
                `;
            } else {
                authNav.innerHTML = `
                    <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
                    <li class="nav-item"><a class="nav-link btn btn-primary btn-sm ms-2" href="/register">Register</a></li>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        async function loadCategories() {
            const res = await fetch('/api/categories');
            const data = await res.json();
            const container = document.getElementById('categoryButtons');
            data.categories.forEach(cat => {
                container.innerHTML += `<button class="btn btn-outline-light category-btn" data-category="${cat}">${cat}</button>`;
            });

            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    selectedCategory = this.dataset.category;
                    loadMovies();
                });
            });
        }

        async function loadMovies() {
            const search = document.getElementById('searchInput').value;
            let url = '/api/movies?';
            if (selectedCategory) url += `category=${selectedCategory}&`;
            if (search) url += `search=${search}`;

            const res = await fetch(url);
            const data = await res.json();
            displayMovies(data.movies);
        }

        function displayMovies(movies) {
            const container = document.getElementById('moviesContainer');
            document.getElementById('movieCount').textContent = `Showing ${movies.length} movies`;

            if (movies.length === 0) {
                container.innerHTML = '<div class="col-12 text-center"><p>No movies found.</p></div>';
                return;
            }

            container.innerHTML = '';
            movies.forEach(movie => {
                container.innerHTML += `
                    <div class="col-lg-3 col-md-4 col-sm-6 mb-4">
                        <div class="card movie-card h-100" onclick="window.location.href='/movie/${movie.id}'">
                            <img src="${movie.poster_url}" class="card-img-top movie-poster" alt="${movie.title}">
                            <div class="card-body">
                                <h5 class="card-title">${movie.title}</h5>
                                <span class="badge category-badge mb-2">${movie.category}</span>
                                <span class="badge bg-secondary mb-2">${movie.year}</span>
                                <div class="rating-stars">
                                    ${getStars(movie.avg_rating)}
                                    <small class="text-muted">(${movie.review_count})</small>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function getStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) stars += i <= rating ? '★' : '☆';
            return stars;
        }

        document.getElementById('searchInput').addEventListener('input', loadMovies);

        updateNav();
        loadCategories();
        loadMovies();
    </script>
</body>
</html>
