<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieHub - My Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e8f4fc; color: #2c3e50; min-height: 100vh; }
        .navbar { background-color: #5dade2 !important; }
        .navbar-brand { color: #fff !important; font-weight: bold; font-size: 1.5rem; }
        .nav-link { color: #fff !important; }
        .nav-link:hover, .nav-link.active { color: #1a5276 !important; }
        .review-card { background-color: #fff; border: 1px solid #aed6f1; margin-bottom: 15px; }
        .rating-stars { color: #f39c12; }
        .btn-primary { background-color: #3498db; border-color: #3498db; }
        .btn-outline-danger:hover { background-color: #dc3545; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">MovieHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/movies">All Movies</a></li>
                </ul>
                <ul class="navbar-nav" id="authNav"></ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h1 class="mb-4">My Reviews</h1>
        <p class="text-muted" id="reviewCount">Loading...</p>

        <div id="reviewsContainer">
            <p>Loading your reviews...</p>
        </div>
    </div>

    <footer class="py-4 mt-auto" style="background-color: #5dade2;">
        <div class="container text-center">
            <p class="mb-0 text-white">MovieHub - Part 4: Homework</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        if (!token || !user) {
            window.location.href = '/login';
        }

        function updateNav() {
            const authNav = document.getElementById('authNav');
            authNav.innerHTML = `
                <li class="nav-item"><a class="nav-link" href="/submit-movie">Submit Movie</a></li>
                <li class="nav-item"><a class="nav-link active" href="/dashboard">My Reviews</a></li>
                ${user.is_admin ? '<li class="nav-item"><a class="nav-link" href="/admin">Admin</a></li>' : ''}
                <li class="nav-item"><span class="nav-link">Hi, ${user.username}</span></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
            `;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/';
        }

        async function loadMyReviews() {
            const res = await fetch('/api/my-reviews', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
                return;
            }

            const data = await res.json();
            const container = document.getElementById('reviewsContainer');
            document.getElementById('reviewCount').textContent = `You have ${data.reviews.length} reviews`;

            if (data.reviews.length === 0) {
                container.innerHTML = '<p class="text-muted">You haven\'t written any reviews yet. <a href="/movies" style="color: #3498db;">Browse movies</a> to get started!</p>';
                return;
            }

            container.innerHTML = '';
            data.reviews.forEach(review => {
                container.innerHTML += `
                    <div class="card review-card p-3">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="mb-1">
                                    <a href="/movie/${review.movie_id}" style="color: #3498db; text-decoration: none;">${review.movie_title}</a>
                                </h5>
                                <div class="rating-stars mb-2">${getStars(review.rating)}</div>
                            </div>
                            <div>
                                <small class="text-muted me-2">${review.created_at}</small>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteReview(${review.id})">Delete</button>
                            </div>
                        </div>
                        <p class="mb-0">${review.content}</p>
                    </div>
                `;
            });
        }

        function getStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) stars += i <= rating ? '★' : '☆';
            return stars;
        }

        async function deleteReview(reviewId) {
            if (!confirm('Delete this review?')) return;

            const res = await fetch(`/api/reviews/${reviewId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                loadMyReviews();
            }
        }

        updateNav();
        loadMyReviews();
    </script>
</body>
</html>
